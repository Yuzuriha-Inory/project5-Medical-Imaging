name: med_env

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy=1.26.4
  - pandas=2.1.4
  - matplotlib=3.8.2
  - scikit-learn=1.3.2
  - pillow=10.1.0
  - tqdm=4.66.1
  - scipy=1.11.4

  - pip:
      - scikit-image==0.22.0
      - SimpleITK==2.3.1
      - opencv-python==4.9.0.80
      - torch==2.5.1
      - torchvision==0.20.1
      - --index-url https://download.pytorch.org/whl/cu121